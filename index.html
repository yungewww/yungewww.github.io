<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkMesh</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#fff; }
  </style>
</head>
<body>
  <div style="width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;">
    <canvas id="c" style="display:block;cursor:grab;"></canvas>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const size = Math.min(window.innerWidth, window.innerHeight) * 0.8;
    canvas.width = size;
    canvas.height = size;
    canvas.style.width = size+'px';
    canvas.style.height = size+'px';

    const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(size, size);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0,0,0);

    const geo = new THREE.BoxGeometry(1.5,1.5,1.5);
    const mat = new THREE.MeshStandardMaterial({color:0x444444, roughness:0.8, metalness:0.0});
    const cube = new THREE.Mesh(geo, mat);
    scene.add(cube);

    scene.add(new THREE.AmbientLight(0xffffff, 0.2));
    const key = new THREE.DirectionalLight(0xffffff, 1.5);
    key.position.set(3,4,2);
    scene.add(key);

    let isDragging=false,prevX=0,prevY=0,velX=0,velY=0,autoRotate=true;

    canvas.addEventListener('mousedown',e=>{isDragging=true;autoRotate=false;prevX=e.clientX;prevY=e.clientY;canvas.style.cursor='grabbing';});
    window.addEventListener('mouseup',()=>{isDragging=false;canvas.style.cursor='grab';});
    window.addEventListener('mousemove',e=>{
      if(!isDragging)return;
      velX=(e.clientX-prevX)*0.01;velY=(e.clientY-prevY)*0.01;
      cube.rotation.y+=velX;cube.rotation.x+=velY;
      prevX=e.clientX;prevY=e.clientY;
    });

    canvas.addEventListener('touchstart',e=>{isDragging=true;autoRotate=false;prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;});
    canvas.addEventListener('touchend',()=>{isDragging=false;});
    canvas.addEventListener('touchmove',e=>{
      if(!isDragging)return;
      cube.rotation.y+=(e.touches[0].clientX-prevX)*0.01;
      cube.rotation.x+=(e.touches[0].clientY-prevY)*0.01;
      prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;
      e.preventDefault();
    },{passive:false});

    function animate(){
      requestAnimationFrame(animate);
      if(autoRotate){cube.rotation.y+=0.005;cube.rotation.x+=0.002;}
      else if(!isDragging){cube.rotation.y+=velX;cube.rotation.x+=velY;velX*=0.95;velY*=0.95;}
      renderer.render(scene,camera);
    }
    animate();
  </script>
</body>
</html>
